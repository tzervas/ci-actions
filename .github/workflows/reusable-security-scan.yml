name: Security Scan
description: Reusable workflow for comprehensive security scanning

on:
  workflow_call:
    inputs:
      scan-targets:
        description: 'What to scan (code, dependencies, container, all)'
        required: false
        type: string
        default: 'all'
      container-image:
        description: 'Container image to scan (if scan-targets includes container)'
        required: false
        type: string
        default: ''
      severity-threshold:
        description: 'Minimum severity to report'
        required: false
        type: string
        default: 'HIGH'
      fail-on-findings:
        description: 'Fail workflow if vulnerabilities found'
        required: false
        type: boolean
        default: false
      upload-sarif:
        description: 'Upload results to GitHub Security tab'
        required: false
        type: boolean
        default: true
      working-directory:
        description: 'Working directory for scans'
        required: false
        type: string
        default: '.'
    secrets:
      SNYK_TOKEN:
        required: false

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: [self-hosted, linux, x64, podman]
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Code scanning
      - name: Run Trivy filesystem scan
        if: contains(inputs.scan-targets, 'code') || inputs.scan-targets == 'all'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ inputs.working-directory }}
          format: 'sarif'
          output: 'trivy-code-results.sarif'
          severity: ${{ inputs.severity-threshold }}
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}
      
      - name: Upload code scan results to GitHub Security
        if: inputs.upload-sarif && (contains(inputs.scan-targets, 'code') || inputs.scan-targets == 'all')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-code-results.sarif'
          category: 'trivy-code'
        continue-on-error: true
      
      # Dependency scanning
      - name: Run Trivy dependency scan
        if: contains(inputs.scan-targets, 'dependencies') || inputs.scan-targets == 'all'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ inputs.working-directory }}
          scanners: 'vuln'
          format: 'sarif'
          output: 'trivy-deps-results.sarif'
          severity: ${{ inputs.severity-threshold }}
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}
      
      - name: Upload dependency scan results
        if: inputs.upload-sarif && (contains(inputs.scan-targets, 'dependencies') || inputs.scan-targets == 'all')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-deps-results.sarif'
          category: 'trivy-dependencies'
        continue-on-error: true
      
      - name: Run Snyk dependency scan
        if: (contains(inputs.scan-targets, 'dependencies') || inputs.scan-targets == 'all') && secrets.SNYK_TOKEN != ''
        run: |
          npm install -g snyk
          snyk test --severity-threshold=high --json-file-output=snyk-results.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
      
      # Container scanning
      - name: Run Trivy container scan
        if: (contains(inputs.scan-targets, 'container') || inputs.scan-targets == 'all') && inputs.container-image != ''
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: ${{ inputs.container-image }}
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          severity: ${{ inputs.severity-threshold }}
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}
      
      - name: Upload container scan results
        if: inputs.upload-sarif && (contains(inputs.scan-targets, 'container') || inputs.scan-targets == 'all') && inputs.container-image != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-container-results.sarif'
          category: 'trivy-container'
        continue-on-error: true
      
      # Upload all results
      - name: Upload all scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            trivy-*-results.sarif
            snyk-results.json
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Security scan summary
        if: always()
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Targets:** ${{ inputs.scan-targets }}" >> $GITHUB_STEP_SUMMARY
          echo "**Severity Threshold:** ${{ inputs.severity-threshold }}" >> $GITHUB_STEP_SUMMARY
          echo "**Container Image:** ${{ inputs.container-image }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security scans completed" >> $GITHUB_STEP_SUMMARY
